version: "3"
services:
  postgres:
    image: postgres:16-alpine
    container_name: person_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: migrate/migrate:4
    container_name: person_migrations
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: person_grpc_app
    ports:
      - "${GRPC_PORT}:${GRPC_PORT}"
    env_file:
      - .env
    environment:
      - DB_ADDRESS=postgres
    depends_on:
      migrations:
        condition: service_completed_successfully

volumes:
  pg_data: